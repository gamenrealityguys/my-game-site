<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini GD Engine</title>
<style>
body { margin:0; overflow:hidden; background:#000; font-family:Arial; }
canvas { display:block; background:#111; }
#ui {
    position:fixed;
    top:10px;
    left:10px;
    color:white;
    z-index:10;
}
button { margin:2px; }
</style>
</head>
<body>

<div id="ui">
    <button onclick="loadLevel(1)">Level 1</button>
    <button onclick="loadLevel(2)">Level 2</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let groundY = canvas.height - 120;
let cameraX = 0;
let currentLevel = 1;
let isDead = false;
let speed = 6;
let keys = {};

let player = {
    x:100,
    y:300,
    size:40,
    velY:0,
    gravity:0.9,
    jump:-18,
    grounded:false,
    rotation:0,
    form:"cube",
    gravityDir:1,
    color:"cyan",
    secondary:"white"
};

let coyoteTime = 0;
let coyoteLimit = 8;

let levels = {

1: [  // Easy + Ship section
    {type:"spike", x:800},
    {type:"spike", x:1200},
    {type:"block", x:1600},
    {type:"block", x:1640},
    {type:"spike", x:2000},
    {type:"portal_ship", x:2500},
    {type:"spike", x:2800},
    {type:"spike", x:3000},
    {type:"spike", x:3300}
],

2: [  // Harder + Ball mode
    {type:"spike", x:600},
    {type:"spike", x:750},
    {type:"block", x:1000},
    {type:"portal_ball", x:1300},
    {type:"spike", x:1500},
    {type:"spike", x:1700},
    {type:"block", x:2000},
    {type:"spike", x:2300},
    {type:"portal_ship", x:2600},
    {type:"spike", x:2900}
]

};

let level = levels[1];

function loadLevel(num){
    currentLevel = num;
    level = levels[num];
    resetPlayer();
}

function resetPlayer(){
    player.x = 100;
    player.y = 300;
    player.velY = 0;
    player.form = "cube";
    player.gravityDir = 1;
    cameraX = 0;
    isDead = false;
}

function update(){
    if(isDead) return;

    cameraX += speed;

    if(player.form === "cube"){
        player.velY += player.gravity;
        player.y += player.velY;

        if(player.y + player.size > groundY){
            player.y = groundY - player.size;
            player.velY = 0;
            player.grounded = true;
            coyoteTime = coyoteLimit;
            player.rotation = 0;
        } else {
            player.grounded = false;
            coyoteTime--;
            player.rotation += 0.15;
        }
    }

    if(player.form === "ship"){
        if(keys["Space"]) player.velY -= 1.5;
        else player.velY += 0.8;
        player.y += player.velY;
        player.rotation = player.velY * 0.05;
    }

    if(player.form === "ball"){
        player.velY += player.gravity * player.gravityDir;
        player.y += player.velY;

        if(player.gravityDir === 1 && player.y + player.size > groundY){
            player.y = groundY - player.size;
            player.velY = 0;
        }

        if(player.gravityDir === -1 && player.y < 0){
            player.y = 0;
            player.velY = 0;
        }

        player.rotation += 0.2;
    }

    if(player.y > canvas.height+200 || player.y < -200){
        die();
    }

    for(let obj of level){
        let objX = obj.x - cameraX;

        if(obj.type === "spike"){
            if(collide(objX, groundY-40,40,40)) die();
        }

        if(obj.type === "block"){
            if(collide(objX, groundY-40,40,40)){
                player.y = groundY-40-player.size;
                player.velY = 0;
                player.grounded = true;
            }
        }

        if(obj.type === "portal_ship" && collide(objX, groundY-80,40,80)){
            player.form = "ship";
        }

        if(obj.type === "portal_ball" && collide(objX, groundY-80,40,80)){
            player.form = "ball";
            player.gravityDir = 1;
        }
    }
}

function collide(x,y,w,h){
    return (
        player.x < x+w &&
        player.x+player.size > x &&
        player.y < y+h &&
        player.y+player.size > y
    );
}

function die(){
    isDead = true;
    setTimeout(resetPlayer,800);
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#333";
    ctx.fillRect(0,groundY,canvas.width,200);

    for(let obj of level){
        let objX = obj.x - cameraX;

        if(obj.type === "spike"){
            ctx.fillStyle="red";
            ctx.beginPath();
            ctx.moveTo(objX,groundY);
            ctx.lineTo(objX+20,groundY-40);
            ctx.lineTo(objX+40,groundY);
            ctx.fill();
        }

        if(obj.type === "block"){
            ctx.fillStyle="#888";
            ctx.fillRect(objX,groundY-40,40,40);
        }

        if(obj.type === "portal_ship"){
            ctx.fillStyle="blue";
            ctx.fillRect(objX,groundY-80,40,80);
        }

        if(obj.type === "portal_ball"){
            ctx.fillStyle="orange";
            ctx.fillRect(objX,groundY-80,40,80);
        }
    }

    drawPlayer();
}

function drawPlayer(){
    ctx.save();
    ctx.translate(player.x+20, player.y+20);
    ctx.rotate(player.rotation);

    ctx.fillStyle = player.color;
    ctx.strokeStyle = player.secondary;
    ctx.lineWidth = 4;

    if(player.form === "cube"){
        ctx.fillRect(-20,-20,40,40);
        ctx.strokeRect(-20,-20,40,40);
    }

    if(player.form === "ship"){
        ctx.beginPath();
        ctx.moveTo(-20,20);
        ctx.lineTo(20,0);
        ctx.lineTo(-20,-20);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
    }

    if(player.form === "ball"){
        ctx.beginPath();
        ctx.arc(0,0,20,0,Math.PI*2);
        ctx.fill();
        ctx.stroke();
    }

    ctx.restore();
}

document.addEventListener("keydown", e=>{
    keys[e.code]=true;

    if(player.form==="cube" && e.code==="Space"){
        if(player.grounded || coyoteTime > 0){
            player.velY = player.jump;
            coyoteTime = 0;
        }
    }

    if(player.form==="ball" && e.code==="Space"){
        player.gravityDir *= -1;
        player.velY = 0;
    }
});

document.addEventListener("keyup", e=>{
    keys[e.code]=false;
});

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
